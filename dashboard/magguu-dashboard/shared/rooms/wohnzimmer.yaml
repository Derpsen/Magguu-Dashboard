title: Wohnzimmer
path: wohnzimmer
icon: mdi:sofa-outline
subview: true
theme: Magguu Midnight
type: custom:grid-layout
layout:
  max-width: 1280px
  margin: 0 auto
  padding: var(--mag-space-page-wide, 18px) var(--mag-space-page-wide, 18px) 40px
  grid-gap: 14px
  grid-template-columns: repeat(2, minmax(0, 1fr))
  grid-template-areas: |
    "hero hero"
    "status status"
    "light climate"
    "light cover"
    "media cover"
  mediaquery:
    "(max-width: 860px)":
      padding: var(--mag-space-page-mobile, 10px) var(--mag-space-page-mobile, 10px) 28px
      grid-template-columns: minmax(0, 1fr)
      grid-template-areas: |
        "hero"
        "status"
        "light"
        "climate"
        "cover"
        "media"
cards:
  - type: custom:button-card
    template: page_header_v6
    name: Wohnzimmer
    icon: mdi:sofa-outline
    variables:
      subtitle: Licht, Klima, Rollläden und Medien
      accent: '#6faeff'
    view_layout: {grid-area: hero}

  - type: custom:grid-layout
    view_layout: {grid-area: status}
    layout:
      grid-template-columns: repeat(3, minmax(0, 1fr))
      grid-gap: 12px
      mediaquery:
        "(max-width: 620px)":
          grid-template-columns: repeat(2, minmax(0, 1fr))
    cards:
      - type: custom:button-card
        template: quick_v5
        entity: sensor.magguu_wohnzimmer_temperatur_c
        name: Temperatur
        icon: mdi:thermometer
        variables:
          accent: '#ff9868'
          sub: "[[[ return `${entity?.state ?? '—'} °C`; ]]]"
        tap_action: {action: more-info}
      - type: custom:button-card
        template: quick_v5
        entity: sensor.wohnzimmer_wohnzimmer_thermostat_rel_luftfeuchte
        name: Luftfeuchte
        icon: mdi:water-percent
        variables:
          accent: '#57cbd3'
          sub: "[[[ return `${entity?.state ?? '—'} %`; ]]]"
        tap_action: {action: more-info}
      - type: custom:mushroom-template-card
        entity: binary_sensor.magguu_wohnzimmer_oeffnung
        primary: Fenster / Tür
        secondary: "{{ 'Geöffnet · antippen für Details' if is_state(entity, 'on') else 'Geschlossen' }}"
        icon: "{{ 'mdi:window-open-variant' if is_state(entity, 'on') else 'mdi:window-closed-variant' }}"
        color: "{{ 'orange' if is_state(entity, 'on') else 'green' }}"
        tap_action: {action: more-info}
        card_mod: &detail_card
          style: |
            ha-card {
              min-height: 86px;
              border-radius: var(--mag-radius-card, 24px);
              background: var(--mag-surface, rgba(24,25,39,.94));
              border: 1px solid var(--mag-border, rgba(255,255,255,.06));
              box-shadow: var(--mag-shadow-card, none);
            }

  - type: custom:grid-layout
    view_layout: {grid-area: light}
    layout:
      grid-template-columns: repeat(2, minmax(0, 1fr))
      grid-gap: 10px
      mediaquery:
        "(max-width: 520px)":
          grid-template-columns: minmax(0, 1fr)
    cards:
      - type: custom:mushroom-title-card
        title: Beleuchtung
        subtitle: Gruppen und Akzentlichter dimmen
        view_layout: {grid-column: 1 / -1}
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.wohnzimmer_wohnzimmer
        name: Wohnzimmer gesamt
        icon: mdi:lightbulb-group-outline
        show_state: true
        card_layout: large
        styles: &bubble_style |
          ha-card {
            --bubble-border-radius: var(--mag-radius-card, 24px);
            --bubble-box-shadow: var(--mag-shadow-card, none);
            --bubble-border: 1px solid var(--mag-border, rgba(255,255,255,.06));
          }
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.wohnzimmer_licht_sideboard
        name: Sideboard
        icon: mdi:lamps-outline
        show_state: true
        card_layout: large
        styles: *bubble_style
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.wohnzimmer_licht_fenster
        name: Fensterlicht
        icon: mdi:window-open-variant
        show_state: true
        card_layout: large
        styles: *bubble_style
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.wohnzimmer_hue_play_links
        name: Hue Play links
        icon: mdi:wall-sconce-flat
        show_state: true
        card_layout: large
        styles: *bubble_style
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.wohnzimmer_hue_play_rechts
        name: Hue Play rechts
        icon: mdi:wall-sconce-flat
        show_state: true
        card_layout: large
        styles: *bubble_style
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.computerbereich
        name: Computerbereich
        icon: mdi:monitor-dashboard
        show_state: true
        card_layout: large
        styles: *bubble_style
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.sonstiges_festavia_string_lights
        name: Festavia
        icon: mdi:string-lights
        show_state: true
        card_layout: large
        styles: *bubble_style

  - type: vertical-stack
    view_layout: {grid-area: climate}
    cards:
      - type: custom:mushroom-title-card
        title: Klima
        subtitle: Heizung und 48-Stunden-Verlauf
      - type: custom:mushroom-climate-card
        entity: climate.wohnzimmer_wohnzimmer_thermostat
        name: Wohnzimmer
        show_temperature_control: true
        collapsible_controls: false
        card_mod: *detail_card
      - type: custom:mini-graph-card
        name: Temperatur · 48 Stunden
        hours_to_show: 48
        points_per_hour: 1
        line_width: 2
        show: {labels: true, legend: false, fill: fade}
        entities:
          - sensor.magguu_wohnzimmer_temperatur_c
        card_mod: *detail_card

  - type: vertical-stack
    view_layout: {grid-area: cover}
    cards:
      - type: custom:mushroom-title-card
        title: Rollläden
        subtitle: Drei Positionen gezielt einstellen
      - type: custom:mushroom-cover-card
        entity: cover.wohnzimmer_wohnzimmer_rollade_links
        name: Rollladen links
        show_buttons_control: true
        show_position_control: true
        card_mod: *detail_card
      - type: custom:mushroom-cover-card
        entity: cover.wohnzimmer_wohnzimmer_rollade_mitte
        name: Rollladen Mitte
        show_buttons_control: true
        show_position_control: true
        card_mod: *detail_card
      - type: custom:mushroom-cover-card
        entity: cover.wohnzimmer_wohnzimmer_rollade_rechts
        name: Rollladen rechts
        show_buttons_control: true
        show_position_control: true
        card_mod: *detail_card

  - type: vertical-stack
    view_layout: {grid-area: media}
    cards:
      - type: custom:mushroom-title-card
        title: Medien & Geräte
        subtitle: Steckdosen mit Sicherheitsabfrage
      - type: custom:mushroom-entity-card
        entity: switch.wohnzimmer_wohnzimmer_fernseher
        name: Fernseher
        icon: mdi:television
        tap_action:
          action: toggle
          confirmation:
            text: Fernseher-Steckdose wirklich umschalten?
        hold_action: {action: more-info}
        card_mod: *detail_card
      - type: custom:mushroom-entity-card
        entity: switch.wohnzimmer_wohnzimmer_computer
        name: Computer
        icon: mdi:desktop-tower-monitor
        tap_action:
          action: toggle
          confirmation:
            text: Computer-Steckdose wirklich umschalten?
        hold_action: {action: more-info}
        card_mod: *detail_card
      - type: custom:mushroom-media-player-card
        entity: media_player.av_samsung_soundbar_q90r
        name: Samsung Soundbar
        icon: mdi:soundbar
        use_media_info: true
        show_volume_level: true
        media_controls:
          - play_pause_stop
        volume_controls:
          - volume_mute
          - volume_set
        collapsible_controls: true
        card_mod: *detail_card
