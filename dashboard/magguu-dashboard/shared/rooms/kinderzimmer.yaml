title: Kinderzimmer
path: kinderzimmer
icon: mdi:teddy-bear
subview: true
theme: Magguu Midnight
type: custom:grid-layout
layout:
  max-width: 1180px
  margin: 0 auto
  padding: var(--mag-space-page-wide, 18px) var(--mag-space-page-wide, 18px) 40px
  grid-gap: 14px
  grid-template-columns: repeat(2, minmax(0, 1fr))
  grid-template-areas: |
    "hero hero"
    "light climate"
    "light cover"
  mediaquery:
    "(max-width: 760px)":
      padding: var(--mag-space-page-mobile, 10px) var(--mag-space-page-mobile, 10px) 28px
      grid-template-columns: minmax(0, 1fr)
      grid-template-areas: |
        "hero"
        "light"
        "climate"
        "cover"
cards:
  - type: custom:button-card
    template: room_detail_header_v7
    name: Kinderzimmer
    icon: mdi:teddy-bear
    variables:
      subtitle: Licht, Raumklima und Rollladen
      accent: '#e886ad'
      temperature_entity: sensor.magguu_kinderzimmer_temperatur_c
      humidity_entity: sensor.kinderzimmer_kinderzimmer_thermostat_rel_luftfeuchte
      opening_entity: binary_sensor.magguu_kinderzimmer_oeffnung
      light_count_entity: sensor.magguu_kinderzimmer_lichter_an
      climate_entity: climate.kinderzimmer_kinderzimmer_thermostat
    view_layout: {grid-area: hero}

  - type: vertical-stack
    view_layout: {grid-area: light}
    cards:
      - type: custom:mushroom-title-card
        title: Beleuchtung
        subtitle: Haupt- und Schranklicht dimmen
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.kinderzimmer_kinderzimmer
        name: Kinderzimmer gesamt
        icon: mdi:lightbulb-group-outline
        show_state: true
        card_layout: large
        styles: &bubble_style |
          ha-card {
            --bubble-border-radius: var(--mag-radius-card, 24px);
            --bubble-box-shadow: var(--mag-shadow-card, none);
            --bubble-border: 1px solid var(--mag-border, rgba(255,255,255,.06));
          }
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.kinderzimmer_schrank_licht
        name: Schranklicht
        icon: mdi:wardrobe-outline
        show_state: true
        card_layout: large
        styles: *bubble_style

  - type: vertical-stack
    view_layout: {grid-area: climate}
    cards:
      - type: custom:mushroom-title-card
        title: Klima
        subtitle: Heizung und Verlauf
      - type: custom:mushroom-climate-card
        entity: climate.kinderzimmer_kinderzimmer_thermostat
        name: Kinderzimmer
        show_temperature_control: true
        collapsible_controls: false
        card_mod: &detail_card
          style: |
            ha-card {
              border-radius: var(--mag-radius-card, 24px);
              background: var(--mag-surface, rgba(24,25,39,.94));
              border: 1px solid var(--mag-border, rgba(255,255,255,.06));
              box-shadow: var(--mag-shadow-card, none);
            }
      - type: custom:mini-graph-card
        name: Temperatur · 48 Stunden
        hours_to_show: 48
        points_per_hour: 1
        line_width: 2
        show: {labels: true, legend: false, fill: fade}
        entities:
          - sensor.magguu_kinderzimmer_temperatur_c
        card_mod: *detail_card

  - type: vertical-stack
    view_layout: {grid-area: cover}
    cards:
      - type: custom:mushroom-title-card
        title: Rollladen
        subtitle: Position gezielt einstellen
      - type: custom:mushroom-cover-card
        entity: cover.kinderzimmer_kinderzimmer_rollade
        name: Rollladen Kinderzimmer
        show_buttons_control: true
        show_position_control: true
        card_mod: *detail_card
