- type: custom:mushroom-title-card
  title: Räume
  subtitle: Alles Wichtige direkt im Blick
  view_layout:
    grid-column: 1 / -1

- type: custom:stack-in-card
  mode: vertical
  cards:
    - type: custom:button-card
      template: room_visual_v5
      name: Wohnzimmer
      icon: mdi:sofa-outline
      variables:
        room_path: wohnzimmer
        accent: '#6faeff'
        light_count_entity: sensor.magguu_wohnzimmer_lichter_an
        temperature_entity: sensor.magguu_wohnzimmer_temperatur_c
        humidity_entity: sensor.wohnzimmer_wohnzimmer_thermostat_rel_luftfeuchte
        opening_entity: binary_sensor.magguu_wohnzimmer_oeffnung
    - type: grid
      columns: 2
      square: false
      cards:
        - type: custom:button-card
          template: room_action_v5
          entity: light.wohnzimmer_wohnzimmer
          name: Hauptlicht
          icon: mdi:lightbulb-group
          variables: {accent: '#ffd166'}
        - type: custom:button-card
          template: room_action_v5
          entity: switch.wohnzimmer_wohnzimmer_fernseher
          name: Fernseher
          icon: mdi:television
          variables: {accent: '#b48cff'}
          tap_action:
            action: toggle
            confirmation:
              text: Fernseher-Steckdose wirklich umschalten?
        - type: custom:button-card
          template: room_action_v5
          entity: switch.wohnzimmer_wohnzimmer_computer
          name: Computer
          icon: mdi:desktop-tower-monitor
          variables: {accent: '#70d6c8'}
          tap_action:
            action: toggle
            confirmation:
              text: Computer-Steckdose wirklich umschalten?
        - type: custom:button-card
          template: room_link_v5
          name: Rollläden
          icon: mdi:window-shutter
          variables: {accent: '#71b7ff', room_path: wohnzimmer, link_label: 3 Rollläden}
        - type: custom:button-card
          template: room_action_v5
          entity: media_player.av_samsung_soundbar_q90r
          name: Soundbar
          icon: mdi:soundbar
          tap_action: {action: more-info}
          variables: {accent: '#b48cff', active_label: Aktiv, inactive_label: Bereit}
  card_mod: &room_shell
    style: |
      ha-card {
        border-radius: var(--mag-radius-card, 24px);
        background: var(--mag-surface, rgba(24,25,39,.94));
        border: 1px solid var(--mag-border, rgba(255,255,255,.06));
        box-shadow: var(--mag-shadow-card, none);
        overflow: hidden;
      }

- type: custom:stack-in-card
  mode: vertical
  cards:
    - type: custom:button-card
      template: room_visual_v5
      name: Esszimmer
      icon: mdi:table-furniture
