title: Kinderzimmer
path: kinderzimmer
icon: mdi:teddy-bear
subview: true
type: sections
max_columns: 3
sections:
  - type: grid
    cards:
      - type: custom:mushroom-title-card
        title: Kinderzimmer
        subtitle: Licht, Klima und Geräte
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.magguu_kinderzimmer_temperatur_c
            name: Temperatur
            icon: mdi:thermometer
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.kinderzimmer_kinderzimmer_thermostat_rel_luftfeuchte
            name: Luftfeuchte
            icon: mdi:water-percent
            icon_color: blue
      - type: custom:mushroom-template-card
        entity: binary_sensor.magguu_kinderzimmer_oeffnung
        primary: Fenster / Tür
        secondary: "{{ 'Geöffnet' if is_state(entity, 'on') else 'Geschlossen' }}"
        icon: "{{ 'mdi:window-open-variant' if is_state(entity, 'on') else 'mdi:window-closed-variant' }}"
        color: "{{ 'orange' if is_state(entity, 'on') else 'green' }}"
        tap_action:
          action: more-info
  - type: grid
    cards:
      - type: heading
        heading: Beleuchtung
        icon: mdi:lightbulb-group-outline
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.kinderzimmer_kinderzimmer
        name: Kinderzimmer gesamt
        icon: mdi:lightbulb-group-outline
        show_state: true
        card_layout: large
        styles: |
          ha-card {
            --bubble-border-radius: 22px;
            --bubble-box-shadow: none;
            --bubble-border: 1px solid color-mix(in srgb, var(--divider-color) 55%, transparent);
          }
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.kinderzimmer_schrank_licht
        name: Schranklicht
        icon: mdi:wardrobe-outline
        show_state: true
        card_layout: large
        styles: |
          ha-card {
            --bubble-border-radius: 22px;
            --bubble-box-shadow: none;
            --bubble-border: 1px solid color-mix(in srgb, var(--divider-color) 55%, transparent);
          }
  - type: grid
    cards:
      - type: heading
        heading: Klima
        icon: mdi:radiator
      - type: custom:mushroom-climate-card
        entity: climate.kinderzimmer_kinderzimmer_thermostat
        name: Kinderzimmer
        show_temperature_control: true
        collapsible_controls: false
      - type: custom:mini-graph-card
        name: Temperatur · Kinderzimmer
        hours_to_show: 48
        points_per_hour: 1
        line_width: 2
        show:
          labels: true
          legend: false
          fill: fade
        entities:
          - sensor.magguu_kinderzimmer_temperatur_c
        card_mod:
          style: |
            ha-card { border-radius: 22px; box-shadow: none; }
      - type: heading
        heading: Rollläden
        icon: mdi:window-shutter
      - type: custom:mushroom-cover-card
        entity: cover.kinderzimmer_kinderzimmer_rollade
        name: Rollladen Kinderzimmer
        show_buttons_control: true
        show_position_control: true
