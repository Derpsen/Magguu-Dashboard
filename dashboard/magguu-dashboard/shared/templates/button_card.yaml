mag_card:
  show_icon: true
  show_name: true
  show_state: false
  show_label: true
  tap_action:
    action: none
  hold_action:
    action: none
  styles:
    card:
      - border-radius: var(--mag-radius-card, 24px)
      - padding: var(--mag-space-card, 16px)
      - background: var(--mag-surface, rgba(24, 25, 39, 0.92))
      - border: 1px solid var(--mag-border, rgba(255,255,255,0.055))
      - box-shadow: none
      - overflow: hidden
    name:
      - font-weight: 700
      - color: var(--primary-text-color)
    label:
      - color: var(--secondary-text-color)

hero_v5:
  template: mag_card
  variables:
    show_weather: false
  show_icon: false
  name: |
    [[[
      const h = new Date().getHours();
      const greeting = h < 5 ? 'Gute Nacht' : h < 11 ? 'Guten Morgen' : h < 17 ? 'Guten Tag' : h < 22 ? 'Guten Abend' : 'Gute Nacht';
      return `${greeting}, Marco`;
    ]]]
  label: |
    [[[
      return new Intl.DateTimeFormat('de-DE', {weekday:'long', day:'2-digit', month:'long'}).format(new Date());
    ]]]
  custom_fields:
    weather: |
      [[[
        if (!variables.show_weather) return '';
        const weather=states['weather.forecast_home'];
        if(!weather||['unknown','unavailable'].includes(weather.state)) {
          return `<div class="hero-weather hero-weather-unavailable">
            <ha-icon icon="mdi:weather-cloudy-alert"></ha-icon>
            <span>Wetter nicht verfügbar</span>
          </div>`;
        }
        const icons={
          'clear-night':'mdi:weather-night',
          cloudy:'mdi:weather-cloudy',
          fog:'mdi:weather-fog',
          hail:'mdi:weather-hail',
          lightning:'mdi:weather-lightning',
          'lightning-rainy':'mdi:weather-lightning-rainy',
          partlycloudy:'mdi:weather-partly-cloudy',
          pouring:'mdi:weather-pouring',
          rainy:'mdi:weather-rainy',
          snowy:'mdi:weather-snowy',
          'snowy-rainy':'mdi:weather-snowy-rainy',
          sunny:'mdi:weather-sunny',
          windy:'mdi:weather-windy',
          'windy-variant':'mdi:weather-windy-variant',
          exceptional:'mdi:weather-cloudy-alert'
        };
        const labels={
          'clear-night':'Klare Nacht',
          cloudy:'Bewölkt',
          fog:'Nebel',
          hail:'Hagel',
          lightning:'Gewitter',
          'lightning-rainy':'Gewitterregen',
          partlycloudy:'Teilweise bewölkt',
          pouring:'Starker Regen',
          rainy:'Regen',
          snowy:'Schnee',
          'snowy-rainy':'Schneeregen',
          sunny:'Sonnig',
          windy:'Windig',
          'windy-variant':'Windig',
          exceptional:'Unwetter'
        };
        const temperature=Number(weather.attributes?.temperature);
        const humidity=Number(weather.attributes?.humidity);
        const wind=Number(weather.attributes?.wind_speed);
        const tempText=Number.isFinite(temperature)
          ? `${temperature.toFixed(1).replace('.',',')} °C`
          : '—';
        const humidityText=Number.isFinite(humidity) ? `${Math.round(humidity)} %` : '—';
        const windText=Number.isFinite(wind) ? `${Math.round(wind)} km/h` : '—';
        return `<div class="hero-weather">
          <ha-icon class="hero-weather-icon" icon="${icons[weather.state]||'mdi:weather-partly-cloudy'}"></ha-icon>
          <div class="hero-weather-copy">
            <span class="hero-weather-condition">${labels[weather.state]||weather.state}</span>
            <strong class="hero-weather-temperature">${tempText}</strong>
            <span class="hero-weather-meta">
              <span><ha-icon icon="mdi:water-percent"></ha-icon>${humidityText}</span>
              <span><ha-icon icon="mdi:weather-windy"></ha-icon>${windText}</span>
            </span>
          </div>
        </div>`;
      ]]]
    chips: |
      [[[
        const S = id => states[id];
        const lights = Number(S('sensor.magguu_lichter_an')?.state || 0);
        const windows = Number(S('sensor.magguu_offene_fenster')?.state || 0);
        const battery = S('sensor.iphone_von_marco_battery_level');
        const avg = S('sensor.magguu_durchschnittstemperatur');
        const home = S('person.magguu')?.state === 'home';
        const pill=(icon,text,color)=>`<span class="v5-pill"><ha-icon icon="${icon}" style="color:${color}"></ha-icon>${text}</span>`;
        return `<div class="v5-pills">
          ${pill(home?'mdi:home-account':'mdi:account-arrow-right-outline',home?'Marco zuhause':'Marco unterwegs',home?'#79d98c':'#9aa0b4')}
          ${pill('mdi:lightbulb-group',`${lights} an`,lights?'#ffd166':'#9aa0b4')}
          ${pill(windows?'mdi:window-open-variant':'mdi:window-closed-variant',windows?`${windows} offen`:'Alles zu',windows?'#ff9f43':'#79d98c')}
          ${pill('mdi:thermometer',avg&&!['unknown','unavailable'].includes(avg.state)?`${avg.state} °C`:'—','#71b7ff')}
          ${pill('mdi:battery',battery&&!['unknown','unavailable'].includes(battery.state)?`${battery.state} %`:'—','#b48cff')}
        </div>`;
      ]]]
  styles:
    card:
      - min-height: 190px
      - padding: 25px
      - background: linear-gradient(140deg, rgba(90,76,170,.34), rgba(24,25,39,.96) 52%, rgba(24,25,39,.96))
    grid:
      - grid-template-areas: |
          [[[
            return variables.show_weather
              ? '"n weather" "l weather" "chips weather"'
              : '"n" "l" "chips"';
          ]]]
      - grid-template-columns: |
          [[[
            return variables.show_weather
              ? 'minmax(0, 1fr) minmax(210px, .34fr)'
              : 'minmax(0, 1fr)';
          ]]]
      - grid-template-rows: min-content min-content 1fr
    name:
      - justify-self: start
      - font-size: 32px
      - letter-spacing: -1.1px
    label:
      - justify-self: start
      - font-size: 13px
      - padding-top: 4px
    custom_fields:
      weather:
        - display: '[[[ return variables.show_weather ? "block" : "none"; ]]]'
        - align-self: stretch
        - justify-self: stretch
        - padding-left: '[[[ return variables.show_weather ? "24px" : "0"; ]]]'
      chips:
        - align-self: end
        - justify-self: start
        - padding-top: 28px
  extra_styles: |
    .v5-pills{display:flex;flex-wrap:wrap;gap:8px}.v5-pill{display:inline-flex;align-items:center;gap:7px;padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.055);font-size:12px;font-weight:650;white-space:nowrap}.v5-pill ha-icon{width:16px;height:16px}
    .hero-weather{height:100%;min-height:138px;box-sizing:border-box;display:flex;align-items:center;justify-content:center;gap:15px;padding:18px;border-radius:21px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.055)}
    .hero-weather-icon{width:48px;height:48px;color:var(--mag-accent-climate,#57cbd3)}
    .hero-weather-copy{display:flex;min-width:0;flex-direction:column;align-items:flex-start;gap:3px}
    .hero-weather-condition{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:700;color:var(--secondary-text-color)}
    .hero-weather-temperature{font-size:27px;line-height:1.08;letter-spacing:-.7px;color:var(--primary-text-color);white-space:nowrap}
    .hero-weather-meta{display:flex;flex-wrap:wrap;gap:5px 11px;padding-top:6px;font-size:11px;font-weight:650;color:var(--secondary-text-color)}
    .hero-weather-meta span{display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
    .hero-weather-meta ha-icon{width:14px;height:14px;color:var(--mag-accent-climate,#57cbd3)}
    .hero-weather-unavailable{font-size:13px;font-weight:650;color:var(--secondary-text-color)}

page_header_v6:
  template: mag_card
  variables:
    subtitle: ''
    accent: '#a891ff'
  show_icon: true
  show_label: true
  size: 38px
  label: '[[[ return variables.subtitle || ""; ]]]'
  styles:
    card:
      - min-height: 132px
      - padding: 24px
      - background: |
          [[[
            return `linear-gradient(140deg, color-mix(in srgb, ${variables.accent || '#a891ff'} 24%, var(--mag-surface, #181927)), var(--mag-surface, #181927) 64%)`;
          ]]]
      - box-shadow: var(--mag-shadow-card, none)
    grid:
      - grid-template-areas: '"i n" "i l"'
      - grid-template-columns: 58px 1fr
      - column-gap: 16px
    img_cell:
      - width: 52px
      - height: 52px
      - border-radius: 18px
      - background: '[[[ return `color-mix(in srgb, ${variables.accent || "#a891ff"} 18%, transparent)`; ]]]'
    icon:
      - color: '[[[ return variables.accent || "#a891ff"; ]]]'
    name:
      - justify-self: start
      - align-self: end
      - font-size: 26px
      - letter-spacing: -.6px
    label:
      - justify-self: start
      - align-self: start
      - padding-top: 5px
      - font-size: 13px
      - white-space: normal

room_visual_v5:
  template: mag_card
  variables:
    accent: '#9b8cff'
    temperature_entity: null
    humidity_entity: null
    opening_entity: null
    light_count_entity: null
    device_text: ''
    room_path: ''
  tap_action:
    action: navigate
    navigation_path: |
      [[[
        const root = window.location.pathname.split('/').filter(Boolean)[0] || 'magguu-mobile';
        return `/${root}/${variables.room_path}`;
      ]]]
  hold_action:
    action: none
  show_icon: true
  size: 82px
  label: |
    [[[
      if (variables.device_text) return variables.device_text;
      return variables.temperature_entity ? 'Raumklima' : 'Raumsteuerung';
    ]]]
  custom_fields:
    climate: |
      [[[
        const t=variables.temperature_entity ? states[variables.temperature_entity] : null;
        const h=variables.humidity_entity ? states[variables.humidity_entity] : null;
        const tv=Number(t?.state), hv=Number(h?.state);
        const validTemperature=t&&!['unknown','unavailable'].includes(t.state)&&Number.isFinite(tv);
        const validHumidity=h&&!['unknown','unavailable'].includes(h.state)&&Number.isFinite(hv);
        if(!validTemperature) return '';
        const temperature=`${tv.toFixed(1).replace('.',',')} °C`;
        const humidity=validHumidity
          ? `<span class="room-humidity"><ha-icon icon="mdi:water-percent"></ha-icon>${Math.round(hv)} %</span>`
          : '';
        return `<div class="room-climate-pill">
          <ha-icon class="room-temperature-icon" icon="mdi:thermometer"></ha-icon>
          <span class="room-temperature">${temperature}</span>
          ${humidity}
        </div>`;
      ]]]
    meta: |
      [[[
        const c=Number(states[variables.light_count_entity]?.state||0);
        const opening=variables.opening_entity ? states[variables.opening_entity] : null;
        const open=opening?.state==='on';
        const a=[];
        a.push(c?`${c} ${c===1?'Licht':'Lichter'} an`:'Licht aus');
        if(open) a.push('Fenster offen');
        else if(opening && !['unknown','unavailable'].includes(opening.state)) a.push('Fenster zu');
        else if(variables.opening_entity) a.push('Fensterstatus fehlt');
        return a.join(' · ');
      ]]]
    orb: |
      [[[
        return `<div class="room-orb"></div>`;
      ]]]
  styles:
    card:
      - min-height: 158px
      - padding: 18px
      - border-radius: var(--mag-radius-card, 24px) var(--mag-radius-card, 24px) 0 0
      - border-bottom: none
      - background: |
          [[[
            const c=Number(states[variables.light_count_entity]?.state||0);
            const open=variables.opening_entity && states[variables.opening_entity]?.state==='on';
            const accent=variables.accent||'#9b8cff';
            if(open) return 'linear-gradient(145deg, color-mix(in srgb, var(--mag-accent-warning, #ff9f43) 22%, var(--mag-surface, #181927)), var(--mag-surface, #181927) 62%)';
            if(c>0) return `linear-gradient(145deg, color-mix(in srgb, ${accent} 20%, rgba(24,25,39,.96)), rgba(24,25,39,.96) 60%)`;
            return 'rgba(24,25,39,.92)';
          ]]]
      - box-shadow: |
          [[[
            const c=Number(states[variables.light_count_entity]?.state||0);
            return c>0?`inset 0 0 0 1px ${variables.accent||'#9b8cff'}, 0 0 18px color-mix(in srgb, ${variables.accent||'#9b8cff'} 24%, transparent)`:'none';
          ]]]
    grid:
      - grid-template-areas: '"n climate" "l climate" "meta meta" "i ." "orb orb"'
      - grid-template-columns: minmax(0, 1fr) min-content
      - grid-template-rows: min-content min-content 1fr min-content 0px
    name:
      - justify-self: start
      - font-size: 23px
      - letter-spacing: -.45px
    label:
      - justify-self: start
      - font-size: 12px
      - padding-top: 3px
    img_cell:
      - justify-self: start
      - align-self: end
      - width: 108px
      - height: 66px
      - margin-left: -16px
      - margin-bottom: -18px
      - border-radius: 0 100% 0 0
      - background: rgba(255,255,255,.032)
      - z-index: 2
    icon:
      - width: 52px
      - color: rgba(210,211,232,.35)
    custom_fields:
      climate:
        - justify-self: end
        - align-self: start
        - grid-row: 1 / 3
        - z-index: 3
      meta:
        - justify-self: start
        - padding-top: 9px
        - font-size: 12px
        - color: var(--secondary-text-color)
      orb:
        - position: absolute
        - right: -30px
        - bottom: -58px
        - width: 138px
        - height: 138px
        - border-radius: 50%
        - background: |
            [[[
              return `color-mix(in srgb, ${variables.accent||'#9b8cff'} 7%, transparent)`;
            ]]]
        - pointer-events: none
  extra_styles: |
    .room-climate-pill {
      display: grid;
      grid-template-areas: "icon temp" "icon humidity";
      grid-template-columns: 38px min-content;
      align-items: center;
      column-gap: 8px;
      row-gap: 4px;
      min-width: 124px;
      padding: 4px 2px;
    }
    .room-temperature-icon {
      grid-area: icon;
      box-sizing: border-box;
      width: 38px;
      height: 38px;
      padding: 8px;
      border-radius: 13px;
      background: color-mix(in srgb, var(--mag-accent-climate, #57cbd3) 16%, transparent);
      color: var(--mag-accent-climate, #57cbd3);
    }
    .room-temperature {
      grid-area: temp;
      align-self: end;
      font-size: 21px;
      line-height: 1;
      font-weight: 750;
      letter-spacing: -.6px;
      color: var(--primary-text-color);
      white-space: nowrap;
    }
    .room-humidity {
      grid-area: humidity;
      align-self: start;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 5px;
      font-size: 14px;
      line-height: 1.1;
      font-weight: 700;
      color: var(--primary-text-color);
      white-space: nowrap;
    }
    .room-humidity ha-icon {
      width: 16px;
      height: 16px;
      color: var(--mag-accent-climate, #57cbd3);
    }

room_action_v5:
  template: mag_card
  show_name: true
  show_label: true
  size: 24px
  variables:
    accent: '#ffd166'
    inactive_label: Aus
    active_label: An
  label: |
    [[[
      if (!entity || ['unknown','unavailable'].includes(entity.state)) return 'Nicht verfügbar';
      if (entity.entity_id.startsWith('cover.')) {
        if (entity.state === 'open') return 'Geöffnet';
        if (entity.state === 'closed') return 'Geschlossen';
        return entity.state === 'opening' ? 'Öffnet' : entity.state === 'closing' ? 'Schließt' : 'Bedienen';
      }
      if (entity.entity_id.startsWith('climate.')) {
        const value = entity.attributes?.current_temperature;
        return Number.isFinite(Number(value)) ? `${Number(value).toFixed(1).replace('.', ',')} °C` : 'Heizung';
      }
      return ['on','playing','heat'].includes(entity.state) ? (variables.active_label || 'An') : (variables.inactive_label || 'Aus');
    ]]]
  tap_action:
    action: toggle
  hold_action:
    action: more-info
  styles:
    card:
      - min-height: 72px
      - padding: 10px 12px
      - border-radius: var(--mag-radius-control, 17px)
      - background: |
          [[[
            const active=['on','open','opening','playing','heat'].includes(entity?.state);
            return active?`color-mix(in srgb, ${variables.accent||'#ffd166'} 18%, var(--mag-surface-soft, rgba(255,255,255,.035)))`:'var(--mag-surface-soft, rgba(255,255,255,.035))';
          ]]]
      - border: 1px solid var(--mag-border, rgba(255,255,255,.04))
    grid:
      - grid-template-areas: '"i n" "i l"'
      - grid-template-columns: 34px 1fr
      - column-gap: 9px
    img_cell:
      - width: 34px
      - height: 34px
      - border-radius: 12px
      - background: rgba(255,255,255,.035)
    icon:
      - color: |
          [[[
            const active=['on','open','opening','playing','heat'].includes(entity?.state);
            return active?(variables.accent||'#ffd166'):'var(--secondary-text-color)';
          ]]]
    name:
      - justify-self: start
      - align-self: end
      - font-size: 12px
      - font-weight: 700
      - white-space: normal
      - text-align: left
    label:
      - justify-self: start
      - align-self: start
      - font-size: 10px

room_link_v5:
  template: room_action_v5
  variables:
    accent: '#71b7ff'
    room_path: ''
    link_label: Details
  entity: null
  label: '[[[ return variables.link_label || "Details"; ]]]'
  tap_action:
    action: navigate
    navigation_path: |
      [[[
        const root = window.location.pathname.split('/').filter(Boolean)[0] || 'magguu-mobile';
        return `/${root}/${variables.room_path}`;
      ]]]
  hold_action:
    action: none

quick_v5:
  template: mag_card
  variables:
    accent: '#9b8cff'
    sub: ''
  label: '[[[ return variables.sub || ""; ]]]'
  styles:
    card:
      - min-height: 86px
      - padding: 13px
    grid:
      - grid-template-areas: '"i n" "i l"'
      - grid-template-columns: 44px 1fr
      - column-gap: 10px
    img_cell:
      - width: 42px
      - height: 42px
      - border-radius: 15px
      - background: '[[[ return `color-mix(in srgb, ${variables.accent} 15%, transparent)`; ]]]'
    icon:
      - width: 23px
      - color: '[[[ return variables.accent; ]]]'
    name:
      - justify-self: start
      - font-size: 13px
    label:
      - justify-self: start
      - font-size: 11px

next_event_v5:
  template: quick_v5
  variables:
    accent: '#9b8cff'
    empty: Kein Eintrag
  label: |
    [[[
      if(!entity||['unknown','unavailable'].includes(entity.state)) return 'Nicht verfügbar';
      const start=entity.attributes?.start_time;
      if(!start) return variables.empty||'Kein Eintrag';
      const raw=String(start); const d=new Date(raw.length===10?`${raw}T00:00:00`:raw);
      if(Number.isNaN(d.getTime())) return raw;
      const now=new Date(); const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
      const target=new Date(d.getFullYear(),d.getMonth(),d.getDate()); const diff=Math.round((target-today)/86400000);
      const day=diff===0?'Heute':diff===1?'Morgen':new Intl.DateTimeFormat('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'}).format(d);
      const allDay=entity.attributes?.all_day===true||raw.length===10;
      return allDay?day:`${day} · ${new Intl.DateTimeFormat('de-DE',{hour:'2-digit',minute:'2-digit'}).format(d)}`;
    ]]]
  custom_fields:
    event: |
      [[[
        return entity?.attributes?.message || variables.empty || 'Kein Eintrag';
      ]]]
  styles:
    card:
      - min-height: 104px
    grid:
      - grid-template-areas: '"i n" "i event" "i l"'
      - grid-template-columns: 46px 1fr
      - grid-template-rows: min-content min-content min-content
    custom_fields:
      event:
        - justify-self: start
        - font-size: 12px
        - font-weight: 700
        - color: var(--primary-text-color)
        - overflow: hidden
        - text-overflow: ellipsis
        - white-space: nowrap
        - max-width: 210px
