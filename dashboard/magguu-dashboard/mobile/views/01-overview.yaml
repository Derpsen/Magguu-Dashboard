- title: Home
  path: overview
  icon: mdi:home
  theme: Magguu Midnight
  type: custom:grid-layout
  layout:
    margin: 0 auto
    padding: 10px 10px 96px
    grid-gap: 12px
    grid-template-columns: 1fr
  cards:
    - type: custom:button-card
      template: hero_v5
    - type: grid
      columns: 2
      square: false
      cards:
        - type: custom:button-card
          template: next_event_v5
          entity: calendar.arbeiten
          name: Arbeit
          icon: mdi:briefcase-outline
          variables: { accent: '#b48cff' }
        - type: custom:button-card
          template: next_event_v5
          entity: calendar.abfuhr
          name: Abfuhr
          icon: mdi:trash-can-outline
          variables: { accent: '#79d98c' }
        - type: custom:button-card
          template: next_event_v5
          entity: calendar.privat
          name: Privat
          icon: mdi:account-heart-outline
          variables: { accent: '#e886ad' }
        - type: custom:button-card
          template: next_event_v5
          entity: calendar.termine
          name: Termine
          icon: mdi:calendar-star
          variables: { accent: '#71b7ff' }
    - type: weather-forecast
      entity: weather.forecast_home
      name: Wetter
      forecast_type: daily
      card_mod:
        style: |
          ha-card { border-radius:28px; background:rgba(24,25,39,.94); border:1px solid rgba(255,255,255,.055); box-shadow:none; }
    - type: custom:mushroom-title-card
      title: Räume
      subtitle: Direkt steuern oder Raum öffnen
    - type: custom:stack-in-card
      mode: vertical
      cards:
        - type: custom:button-card
          template: room_visual_v5
          name: Wohnzimmer
          icon: mdi:sofa-outline
          tap_action:
            action: navigate
            navigation_path: /magguu-mobile/wohnzimmer
          variables:
            accent: '#6faeff'
            light_count_entity: sensor.magguu_wohnzimmer_lichter_an
            temperature_entity: sensor.magguu_wohnzimmer_temperatur_c
            humidity_entity: sensor.wohnzimmer_wohnzimmer_thermostat_rel_luftfeuchte
            opening_entity: binary_sensor.magguu_wohnzimmer_oeffnung
        - type: grid
          columns: 4
          square: false
          cards:
            - type: custom:button-card
              template: room_action_v5
              entity: light.wohnzimmer_wohnzimmer
              icon: mdi:lightbulb-group
              variables:
                accent: '#ffd166'
              tap_action:
                action: toggle
            - type: custom:button-card
              template: room_action_v5
              entity: switch.wohnzimmer_wohnzimmer_fernseher
              icon: mdi:television
              variables:
                accent: '#b48cff'
              tap_action:
                action: toggle
                confirmation:
                  text: Fernseher-Steckdose wirklich umschalten?
            - type: custom:button-card
              template: room_action_v5
              entity: switch.wohnzimmer_wohnzimmer_computer
              icon: mdi:desktop-tower-monitor
              variables:
                accent: '#70d6c8'
              tap_action:
                action: toggle
                confirmation:
                  text: Computer-Steckdose wirklich umschalten?
            - type: custom:button-card
              template: room_action_v5
              entity: cover.wohnzimmer_wohnzimmer_rollade_mitte
              icon: mdi:window-shutter
              variables:
                accent: '#71b7ff'
              tap_action:
                action: more-info
      card_mod:
        style: |
          ha-card {
            border-radius: 24px;
            background: rgba(24,25,39,.92);
            border: 1px solid rgba(255,255,255,.055);
            box-shadow: none;
            overflow: hidden;
          }
    - type: custom:stack-in-card
      mode: vertical
      cards:
        - type: custom:button-card
          template: room_visual_v5
          name: Esszimmer
          icon: mdi:table-furniture
          tap_action:
            action: navigate
            navigation_path: /magguu-mobile/esszimmer
          variables:
            accent: '#f3a84b'
            light_count_entity: sensor.magguu_esszimmer_lichter_an
            temperature_entity: sensor.magguu_esszimmer_temperatur_c
            humidity_entity: sensor.esszimmer_thermostat_rel_luftfeuchte
        - type: grid
          columns: 3
          square: false
          cards:
            - type: custom:button-card
              template: room_action_v5
              entity: light.esszimmer_esszimmer
              icon: mdi:ceiling-light
              variables:
                accent: '#ffd166'
              tap_action:
                action: toggle
            - type: custom:button-card
              template: room_action_v5
              entity: light.esszimmer_signe_gradient
              icon: mdi:floor-lamp
              variables:
                accent: '#f3a84b'
              tap_action:
                action: toggle
            - type: custom:button-card
              template: room_action_v5
              entity: climate.esszimmer_thermostat
              icon: mdi:radiator
              variables:
                accent: '#ff9868'
              tap_action:
                action: more-info
      card_mod:
        style: |
          ha-card {
            border-radius: 24px;
            background: rgba(24,25,39,.92);
            border: 1px solid rgba(255,255,255,.055);
            box-shadow: none;
            overflow: hidden;
          }
    - type: custom:mushroom-template-card
      primary: Alle Räume
      secondary: Vollständige Raumübersicht öffnen
      icon: mdi:floor-plan
      icon_color: purple
      tap_action:
        action: navigate
        navigation_path: /magguu-mobile/raeume
    - type: grid
      columns: 2
      square: false
      cards:
        - type: custom:button-card
          template: quick_v5
          entity: script.magguu_alle_lichter_aus
          name: Licht aus
          icon: mdi:lightbulb-group-off-outline
          variables: { accent: '#ffd166', sub: Hausweit }
          tap_action:
            action: call-service
            service: script.turn_on
            service_data:
              entity_id: script.magguu_alle_lichter_aus
            confirmation:
              text: Wirklich alle Lichter im Haus ausschalten?
        - type: custom:button-card
          template: quick_v5
          entity: script.magguu_alle_rollladen_zu
          name: Rollläden zu
          icon: mdi:window-shutter
          variables: { accent: '#71b7ff', sub: Alle Räume }
          tap_action:
            action: call-service
            service: script.turn_on
            service_data:
              entity_id: script.magguu_alle_rollladen_zu
            confirmation:
              text: Wirklich alle Rollläden im Haus schließen?
    - !include ../../shared/cards/openings.yaml
    - !include ../cards/navbar.yaml
