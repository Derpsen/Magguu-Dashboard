type: vertical-stack
cards:
  - type: conditional
    conditions:
      - entity: binary_sensor.magguu_wohnzimmer_heizwarnung
        state: 'on'
    card:
      type: custom:mushroom-template-card
      entity: binary_sensor.magguu_wohnzimmer_heizwarnung
      primary: Wohnzimmer · Fenster & Heizung
      secondary: Fenster offen, während die Heizung aktiv heizt
      multiline_secondary: true
      icon: mdi:radiator-off
      icon_color: orange
      tap_action:
        action: navigate
        navigation_path: wohnzimmer
      hold_action:
        action: more-info
      card_mod: &warning_card
        style: |
          ha-card {
            border: 1px solid color-mix(in srgb, var(--mag-accent-warning, #ff9f43) 48%, transparent);
            animation: magguu-warning-pulse 2.8s ease-in-out infinite;
          }
          @keyframes magguu-warning-pulse {
            0%, 100% { box-shadow: 0 0 0 rgba(255,159,67,0); }
            50% { box-shadow: 0 0 18px rgba(255,159,67,.16); }
          }
          @media (prefers-reduced-motion: reduce) {
            ha-card { animation: none; }
          }

  - type: conditional
    conditions:
      - entity: binary_sensor.magguu_schlafzimmer_heizwarnung
        state: 'on'
    card:
      type: custom:mushroom-template-card
      entity: binary_sensor.magguu_schlafzimmer_heizwarnung
      primary: Schlafzimmer · Fenster & Heizung
      secondary: Fenster offen, während die Heizung aktiv heizt
      multiline_secondary: true
      icon: mdi:radiator-off
      icon_color: orange
      tap_action:
        action: navigate
        navigation_path: schlafzimmer
      hold_action:
        action: more-info
      card_mod: *warning_card

  - type: conditional
    conditions:
      - entity: binary_sensor.magguu_kinderzimmer_heizwarnung
        state: 'on'
    card:
      type: custom:mushroom-template-card
      entity: binary_sensor.magguu_kinderzimmer_heizwarnung
      primary: Kinderzimmer · Fenster & Heizung
      secondary: Fenster offen, während die Heizung aktiv heizt
      multiline_secondary: true
      icon: mdi:radiator-off
      icon_color: orange
      tap_action:
        action: navigate
        navigation_path: kinderzimmer
      hold_action:
        action: more-info
      card_mod: *warning_card
