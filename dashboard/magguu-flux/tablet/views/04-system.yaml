- title: System
  path: system
  icon: mdi:cog-outline
  type: sections
  max_columns: 3
  sections:
    - type: grid
      cards:
        - type: custom:mushroom-title-card
          title: Systemstatus
          subtitle: Home Assistant, OpenCCU und Geräte
        - 
          type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-template-card
              entity: sensor.openccu_systemzustand
              primary: OpenCCU
              secondary: "Systemzustand {{ states(entity) }} %"
              icon: mdi:home-automation
              color: "{{ 'green' if states(entity) | float(0) >= 95 else 'orange' }}"
              tap_action:
                action: more-info
            - type: custom:mushroom-template-card
              entity: sensor.openccu_servicemeldungen
              primary: Servicemeldungen
              secondary: "{{ states(entity) }} Meldung(en)"
              icon: mdi:alert-circle-outline
              color: "{{ 'green' if states(entity) | int(0) == 0 else 'red' }}"
              tap_action:
                action: more-info
            - type: custom:mushroom-template-card
              entity: sensor.homematic_ip_zentrale_duty_cycle_level
              primary: Duty Cycle
              secondary: "{{ states(entity) }} %"
              icon: mdi:radio-tower
              color: >-
                {% set value = states(entity) | float(0) %}
                {{ 'green' if value < 50 else 'orange' if value < 80 else 'red' }}
              tap_action:
                action: more-info
            - type: custom:mushroom-template-card
              entity: sensor.homematic_ip_zentrale_carrier_sense_level
              primary: Carrier Sense
              secondary: "{{ states(entity) }} %"
              icon: mdi:access-point-network
              color: >-
                {% set value = states(entity) | float(0) %}
                {{ 'green' if value < 20 else 'orange' if value < 50 else 'red' }}
              tap_action:
                action: more-info
            - type: custom:mushroom-template-card
              entity: sensor.openccu_verbindungslatenz
              primary: Verbindung
              secondary: "{{ states(entity) }} ms"
              icon: mdi:timer-outline
              color: blue
              tap_action:
                action: more-info
            - type: custom:mushroom-template-card
              entity: sensor.iphone_von_marco_battery_level
              primary: iPhone von Marco
              secondary: "{{ states(entity) }} % · {{ states('sensor.iphone_von_marco_battery_state') }}"
              icon: mdi:battery
              color: >-
                {% set value = states(entity) | int(0) %}
                {{ 'green' if value >= 50 else 'orange' if value >= 20 else 'red' }}
              tap_action:
                action: more-info
    - type: grid
      cards:
        - 
          type: custom:auto-entities
          show_empty: false
          card:
            type: entities
            title: Verfügbare Updates
            state_color: true
            card_mod:
              style: |
                ha-card { border-radius: 24px; box-shadow: none; }
          filter:
            include:
              - domain: update
                state: 'on'
          sort:
            method: friendly_name
        - 
          type: custom:auto-entities
          show_empty: false
          card:
            type: entities
            title: Batteriewarnungen
            state_color: true
            card_mod:
              style: |
                ha-card { border-radius: 24px; box-shadow: none; }
          filter:
            include:
              - domain: binary_sensor
                attributes:
                  device_class: battery
                state: 'on'
          sort:
            method: friendly_name
        - 
          type: custom:auto-entities
          show_empty: false
          card:
            type: entities
            title: Nicht erreichbar
            state_color: true
            card_mod:
              style: |
                ha-card { border-radius: 24px; box-shadow: none; }
          filter:
            include:
              - state: unavailable
                domain: light
              - state: unavailable
                domain: switch
              - state: unavailable
                domain: climate
              - state: unavailable
                domain: cover
              - state: unavailable
                domain: media_player
          sort:
            method: friendly_name
    - type: grid
      cards:
        - type: heading
          heading: Backups
          icon: mdi:cloud-check-outline
        - 
          type: vertical-stack
          cards:
            - type: custom:mushroom-template-card
              entity: sensor.backup_backup_manager_state
              primary: Backup-Manager
              secondary: "{{ states(entity) }}"
              icon: mdi:backup-restore
              color: "{{ 'green' if states(entity) == 'idle' else 'blue' }}"
              tap_action:
                action: more-info
            - type: custom:mushroom-template-card
              entity: sensor.backup_last_successful_automatic_backup
              primary: Letztes erfolgreiches Backup
              secondary: >-
                {% if states(entity) not in ['unknown', 'unavailable'] %}
                  {{ as_timestamp(states(entity)) | timestamp_custom('%d.%m.%Y · %H:%M', true) }}
                {% else %}
                  Noch kein Zeitpunkt verfügbar
                {% endif %}
              multiline_secondary: true
              icon: mdi:cloud-check-outline
              color: "{{ 'green' if states(entity) not in ['unknown', 'unavailable'] else 'orange' }}"
              tap_action:
                action: more-info
