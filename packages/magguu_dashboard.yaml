shell_command:
  magguu_dashboard_update: "sh /config/magguu-dashboard-update.sh"

input_text:
  magguu_dashboard_update_status:
    name: Magguu Dashboard Update-Status
    icon: mdi:update
    max: 80

input_datetime:
  magguu_dashboard_letzte_aktualisierung:
    name: Magguu Dashboard letzte Aktualisierung
    icon: mdi:clock-check-outline
    has_date: true
    has_time: true

group:
  magguu_alle_lichter:
    name: Alle Lichter
    icon: mdi:lightbulb-group
    entities:
      - light.badezimmer_badezimmer
      - light.badezimmer_badezimmer_licht_ch12
      - light.badezimmer_badezimmer_licht_ch8
      - light.badezimmer_licht_bad
      - light.computerbereich
      - light.esszimmer_esszimmer
      - light.esszimmer_signe_gradient
      - light.kinderzimmer_kinderzimmer
      - light.kinderzimmer_schrank_licht
      - light.schlafzimmer_bett_links
      - light.schlafzimmer_bett_rechts
      - light.schlafzimmer_schlafzimmer
      - light.sonstiges_festavia_string_lights
      - light.sonstiges_sonstiges
      - light.wohnzimmer_hue_play_links
      - light.wohnzimmer_hue_play_rechts
      - light.wohnzimmer_licht_fenster
      - light.wohnzimmer_licht_sideboard
      - light.wohnzimmer_wohnzimmer
      - switch.badezimmer_badezimmer_licht
      - switch.esszimmer_esszimmer_licht
      - switch.flur_flur_licht
      - switch.kinderzimmer_kinderzimmer_licht
      - switch.kuche_kuche_licht
      - switch.schlafzimmer_schlafzimmer_licht

script:
  magguu_dashboard_aktualisieren:
    alias: Magguu Dashboard aktualisieren
    icon: mdi:cloud-download-outline
    mode: single
    sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.magguu_dashboard_update_status
        data:
          value: Aktualisierung läuft
      - action: shell_command.magguu_dashboard_update
        response_variable: update_result
      - if: "{{ update_result.get('returncode', 1) == 0 }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.magguu_dashboard_update_status
            data:
              value: Erfolgreich
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.magguu_dashboard_letzte_aktualisierung
            data:
              timestamp: "{{ now().timestamp() }}"
          - action: persistent_notification.create
            data:
              title: Magguu Dashboard aktualisiert
              message: >-
                {{ update_result.get('stdout', 'Update abgeschlossen.') }}
                Starte Home Assistant neu und lade die App anschließend vollständig neu.
        else:
          - action: input_text.set_value
            target:
              entity_id: input_text.magguu_dashboard_update_status
            data:
              value: Fehlgeschlagen · Details in Benachrichtigungen
          - action: persistent_notification.create
            data:
              title: Dashboard-Update fehlgeschlagen
              message: >-
                {{ update_result.get('stderr', 'Keine Fehlerbeschreibung verfügbar.') }}

  magguu_alle_lichter_aus:
    alias: Alle Lichter aus
    icon: mdi:lightbulb-group-off
    mode: restart
    sequence:
      - action: homeassistant.turn_off
        target:
          entity_id: group.magguu_alle_lichter

  magguu_alle_rollladen_auf:
    alias: Alle Rollläden öffnen
    icon: mdi:window-shutter-open
    mode: restart
    sequence:
      - action: cover.open_cover
        target:
          entity_id:
            - cover.kinderzimmer_kinderzimmer_rollade
            - cover.kuche_kuche_rollade
            - cover.schlafzimmer_schlafzimmer_rollade_links
            - cover.schlafzimmer_schlafzimmer_rollade_rechts
            - cover.wohnzimmer_wohnzimmer_rollade_links
            - cover.wohnzimmer_wohnzimmer_rollade_mitte
            - cover.wohnzimmer_wohnzimmer_rollade_rechts

  magguu_alle_rollladen_zu:
    alias: Alle Rollläden schließen
    icon: mdi:window-shutter
    mode: restart
    sequence:
      - action: cover.close_cover
        target:
          entity_id:
            - cover.kinderzimmer_kinderzimmer_rollade
            - cover.kuche_kuche_rollade
            - cover.schlafzimmer_schlafzimmer_rollade_links
            - cover.schlafzimmer_schlafzimmer_rollade_rechts
            - cover.wohnzimmer_wohnzimmer_rollade_links
            - cover.wohnzimmer_wohnzimmer_rollade_mitte
            - cover.wohnzimmer_wohnzimmer_rollade_rechts

  magguu_gute_nacht:
    alias: Gute Nacht
    icon: mdi:weather-night
    mode: single
    sequence:
      - action: script.magguu_alle_lichter_aus
        continue_on_error: true
      - action: switch.turn_off
        continue_on_error: true
        target:
          entity_id:
            - switch.wohnzimmer_wohnzimmer_fernseher
            - switch.wohnzimmer_wohnzimmer_computer
      - if: "{{ states('media_player.av_samsung_soundbar_q90r') not in ['unknown', 'unavailable'] }}"
        then:
          - action: media_player.turn_off
            continue_on_error: true
            target:
              entity_id: media_player.av_samsung_soundbar_q90r
      - if: "{{ is_state('binary_sensor.magguu_wohnzimmer_oeffnung', 'off') }}"
        then:
          - action: cover.close_cover
            continue_on_error: true
            target:
              entity_id:
                - cover.wohnzimmer_wohnzimmer_rollade_links
                - cover.wohnzimmer_wohnzimmer_rollade_mitte
                - cover.wohnzimmer_wohnzimmer_rollade_rechts
      - if: "{{ is_state('binary_sensor.magguu_kueche_oeffnung', 'off') }}"
        then:
          - action: cover.close_cover
            continue_on_error: true
            target:
              entity_id: cover.kuche_kuche_rollade
      - if: "{{ is_state('binary_sensor.magguu_schlafzimmer_oeffnung', 'off') }}"
        then:
          - action: cover.close_cover
            continue_on_error: true
            target:
              entity_id:
                - cover.schlafzimmer_schlafzimmer_rollade_links
                - cover.schlafzimmer_schlafzimmer_rollade_rechts
      - if: "{{ is_state('binary_sensor.magguu_kinderzimmer_oeffnung', 'off') }}"
        then:
          - action: cover.close_cover
            continue_on_error: true
            target:
              entity_id: cover.kinderzimmer_kinderzimmer_rollade
      - if: >-
          {{ not is_state('binary_sensor.magguu_wohnzimmer_oeffnung', 'off')
             or not is_state('binary_sensor.magguu_kueche_oeffnung', 'off')
             or not is_state('binary_sensor.magguu_schlafzimmer_oeffnung', 'off')
             or not is_state('binary_sensor.magguu_kinderzimmer_oeffnung', 'off') }}
        then:
          - action: persistent_notification.create
            data:
              title: Gute Nacht · Rollläden geprüft
              message: >-
                {% set ns = namespace(rooms=[]) %}
                {% if not is_state('binary_sensor.magguu_wohnzimmer_oeffnung', 'off') %}
                  {% set ns.rooms = ns.rooms + ['Wohnzimmer'] %}
                {% endif %}
                {% if not is_state('binary_sensor.magguu_kueche_oeffnung', 'off') %}
                  {% set ns.rooms = ns.rooms + ['Küche'] %}
                {% endif %}
                {% if not is_state('binary_sensor.magguu_schlafzimmer_oeffnung', 'off') %}
                  {% set ns.rooms = ns.rooms + ['Schlafzimmer'] %}
                {% endif %}
                {% if not is_state('binary_sensor.magguu_kinderzimmer_oeffnung', 'off') %}
                  {% set ns.rooms = ns.rooms + ['Kinderzimmer'] %}
                {% endif %}
                Die Rollläden in {{ ns.rooms | join(', ') }} wurden nicht geschlossen,
                weil eine Öffnung offen oder ihr Status nicht verfügbar ist.

  magguu_haus_verlassen:
    alias: Haus verlassen
    icon: mdi:home-export-outline
    mode: single
    sequence:
      - action: script.magguu_alle_lichter_aus
        continue_on_error: true
      - action: switch.turn_off
        continue_on_error: true
        target:
          entity_id:
            - switch.wohnzimmer_wohnzimmer_fernseher
            - switch.wohnzimmer_wohnzimmer_computer
      - if: "{{ states('media_player.av_samsung_soundbar_q90r') not in ['unknown', 'unavailable'] }}"
        then:
          - action: media_player.turn_off
            continue_on_error: true
            target:
              entity_id: media_player.av_samsung_soundbar_q90r
      - if: >-
          {{ not is_state('binary_sensor.magguu_wohnzimmer_oeffnung', 'off')
             or not is_state('binary_sensor.magguu_kueche_oeffnung', 'off')
             or not is_state('binary_sensor.magguu_schlafzimmer_oeffnung', 'off')
             or not is_state('binary_sensor.magguu_kinderzimmer_oeffnung', 'off') }}
        then:
          - action: persistent_notification.create
            data:
              title: Haus verlassen · Fenster prüfen
              message: >-
                Mindestens eine Öffnung ist offen oder ihr Status ist nicht verfügbar.
                Tippe auf die Hinweise im Dashboard, um die betroffenen Räume zu prüfen.

  magguu_filmabend:
    alias: Filmabend
    icon: mdi:movie-open-outline
    mode: restart
    sequence:
      - action: switch.turn_on
        continue_on_error: true
        target:
          entity_id: switch.wohnzimmer_wohnzimmer_fernseher
      - if: "{{ states('media_player.av_samsung_soundbar_q90r') not in ['unknown', 'unavailable'] }}"
        then:
          - action: media_player.turn_on
            continue_on_error: true
            target:
              entity_id: media_player.av_samsung_soundbar_q90r
      - action: light.turn_off
        continue_on_error: true
        target:
          entity_id:
            - light.wohnzimmer_wohnzimmer
            - light.wohnzimmer_licht_fenster
            - light.wohnzimmer_licht_sideboard
        data:
          transition: 2
      - action: light.turn_on
        continue_on_error: true
        target:
          entity_id:
            - light.wohnzimmer_hue_play_links
            - light.wohnzimmer_hue_play_rechts
        data:
          brightness_pct: 30
          transition: 2
      - if: "{{ is_state('binary_sensor.magguu_wohnzimmer_oeffnung', 'off') }}"
        then:
          - action: cover.close_cover
            continue_on_error: true
            target:
              entity_id:
                - cover.wohnzimmer_wohnzimmer_rollade_links
                - cover.wohnzimmer_wohnzimmer_rollade_mitte
                - cover.wohnzimmer_wohnzimmer_rollade_rechts
        else:
          - action: persistent_notification.create
            data:
              title: Filmabend · Öffnung prüfen
              message: >-
                Die Wohnzimmer-Rollläden wurden nicht geschlossen,
                weil eine Öffnung offen oder ihr Status nicht verfügbar ist.

template:
  - sensor:
      - name: Magguu Dashboard Version
        unique_id: magguu_dashboard_version
        icon: mdi:view-dashboard-variant-outline
        state: "6.2.0-dev"

      - name: Magguu Lichter an
        unique_id: magguu_lichter_an
        icon: mdi:lightbulb-group
        state: >-
          {% set ids = [
            'light.badezimmer_badezimmer',
            'light.computerbereich',
            'light.esszimmer_esszimmer',
            'light.kinderzimmer_kinderzimmer',
            'light.schlafzimmer_schlafzimmer',
            'light.sonstiges_sonstiges',
            'light.wohnzimmer_wohnzimmer',
            'switch.flur_flur_licht',
            'switch.kuche_kuche_licht'
          ] %}
          {{ expand(ids) | selectattr('state', 'eq', 'on') | list | count }}

      - name: Magguu Offene Fenster
        unique_id: magguu_offene_fenster
        icon: mdi:window-open-variant
        state: >-
          {% set ids = [
            'binary_sensor.kinderzimmer_kinderzimmer_fenster',
            'sensor.kuche_kuche_fenstertur',
            'binary_sensor.schlafzimmer_schlafzimmer_fenstertur',
            'binary_sensor.wohnzimmer_wohnzimmer_fenster',
            'sensor.wohnzimmer_wohnzimmer_fenstertur'
          ] %}
          {% set ns = namespace(count=0) %}
          {% for id in ids %}
            {% if states(id) in ['on', 'open', 'tilted'] %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}

      - name: Magguu Updates verfuegbar
        unique_id: magguu_updates_verfuegbar
        icon: mdi:update
        state: >-
          {{ states.update | selectattr('state', 'eq', 'on') | list | count }}

      - name: Magguu Nicht verfuegbar
        unique_id: magguu_nicht_verfuegbar
        icon: mdi:lan-disconnect
        state: >-
          {% set ids = [
            'weather.forecast_home',
            'climate.badezimmer_badezimmer_thermostat',
            'climate.esszimmer_thermostat',
            'climate.kinderzimmer_kinderzimmer_thermostat',
            'climate.schlafzimmer_schlafzimmer_thermostat',
            'climate.wohnzimmer_wohnzimmer_thermostat',
            'media_player.av_samsung_soundbar_q90r',
            'light.badezimmer_badezimmer',
            'light.esszimmer_esszimmer',
            'light.kinderzimmer_kinderzimmer',
            'light.schlafzimmer_schlafzimmer',
            'light.wohnzimmer_wohnzimmer'
          ] %}
          {% set ns = namespace(count=0) %}
          {% for id in ids %}
            {% if states(id) in ['unknown', 'unavailable'] %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}

      - name: Magguu Wohnzimmer Temperatur C
        unique_id: magguu_wohnzimmer_temperatur_c
        unit_of_measurement: °C
        device_class: temperature
        state_class: measurement
        availability: "{{ states('sensor.wohnzimmer_wohnzimmer_thermostat_temperatur') not in ['unknown', 'unavailable'] }}"
        state: >-
          {% set value = states('sensor.wohnzimmer_wohnzimmer_thermostat_temperatur') | float(0) %}
          {{ (((value - 32) * 5 / 9) if state_attr('sensor.wohnzimmer_wohnzimmer_thermostat_temperatur', 'unit_of_measurement') in ['°F', 'F'] else value) | round(1) }}

      - name: Magguu Esszimmer Temperatur C
        unique_id: magguu_esszimmer_temperatur_c
        unit_of_measurement: °C
        device_class: temperature
        state_class: measurement
        availability: "{{ states('sensor.esszimmer_thermostat_temperatur') not in ['unknown', 'unavailable'] }}"
        state: >-
          {% set value = states('sensor.esszimmer_thermostat_temperatur') | float(0) %}
          {{ (((value - 32) * 5 / 9) if state_attr('sensor.esszimmer_thermostat_temperatur', 'unit_of_measurement') in ['°F', 'F'] else value) | round(1) }}

      - name: Magguu Badezimmer Temperatur C
        unique_id: magguu_badezimmer_temperatur_c
        unit_of_measurement: °C
        device_class: temperature
        state_class: measurement
        availability: "{{ states('sensor.badezimmer_badezimmer_thermostat_temperatur') not in ['unknown', 'unavailable'] }}"
        state: >-
          {% set value = states('sensor.badezimmer_badezimmer_thermostat_temperatur') | float(0) %}
          {{ (((value - 32) * 5 / 9) if state_attr('sensor.badezimmer_badezimmer_thermostat_temperatur', 'unit_of_measurement') in ['°F', 'F'] else value) | round(1) }}

      - name: Magguu Schlafzimmer Temperatur C
        unique_id: magguu_schlafzimmer_temperatur_c
        unit_of_measurement: °C
        device_class: temperature
        state_class: measurement
        availability: "{{ states('sensor.schlafzimmer_schlafzimmer_thermostat_temperatur') not in ['unknown', 'unavailable'] }}"
        state: >-
          {% set value = states('sensor.schlafzimmer_schlafzimmer_thermostat_temperatur') | float(0) %}
          {{ (((value - 32) * 5 / 9) if state_attr('sensor.schlafzimmer_schlafzimmer_thermostat_temperatur', 'unit_of_measurement') in ['°F', 'F'] else value) | round(1) }}

      - name: Magguu Kinderzimmer Temperatur C
        unique_id: magguu_kinderzimmer_temperatur_c
        unit_of_measurement: °C
        device_class: temperature
        state_class: measurement
        availability: "{{ states('sensor.kinderzimmer_kinderzimmer_thermostat_temperatur') not in ['unknown', 'unavailable'] }}"
        state: >-
          {% set value = states('sensor.kinderzimmer_kinderzimmer_thermostat_temperatur') | float(0) %}
          {{ (((value - 32) * 5 / 9) if state_attr('sensor.kinderzimmer_kinderzimmer_thermostat_temperatur', 'unit_of_measurement') in ['°F', 'F'] else value) | round(1) }}

      - name: Magguu Durchschnittstemperatur
        unique_id: magguu_durchschnittstemperatur
        unit_of_measurement: °C
        device_class: temperature
        state_class: measurement
        state: >-
          {% set values = [
            states('sensor.magguu_badezimmer_temperatur_c') | float(none),
            states('sensor.magguu_esszimmer_temperatur_c') | float(none),
            states('sensor.magguu_kinderzimmer_temperatur_c') | float(none),
            states('sensor.magguu_schlafzimmer_temperatur_c') | float(none),
            states('sensor.magguu_wohnzimmer_temperatur_c') | float(none)
          ] | reject('eq', none) | list %}
          {{ (values | sum / values | count) | round(1) if values | count else 0 }}

      - name: Magguu Durchschnitt Luftfeuchtigkeit
        unique_id: magguu_durchschnitt_luftfeuchtigkeit
        unit_of_measurement: '%'
        device_class: humidity
        state_class: measurement
        state: >-
          {% set values = [
            states('sensor.badezimmer_badezimmer_thermostat_rel_luftfeuchte') | float(none),
            states('sensor.esszimmer_thermostat_rel_luftfeuchte') | float(none),
            states('sensor.kinderzimmer_kinderzimmer_thermostat_rel_luftfeuchte') | float(none),
            states('sensor.schlafzimmer_schlafzimmer_thermostat_rel_luftfeuchte') | float(none),
            states('sensor.wohnzimmer_wohnzimmer_thermostat_rel_luftfeuchte') | float(none)
          ] | reject('eq', none) | list %}
          {{ (values | sum / values | count) | round(0) if values | count else 0 }}

      - name: Magguu Wohnzimmer Lichter an
        unique_id: magguu_wohnzimmer_lichter_an
        state: >-
          {% set ids = [
            'light.wohnzimmer_wohnzimmer',
            'light.wohnzimmer_licht_sideboard',
            'light.wohnzimmer_licht_fenster',
            'light.wohnzimmer_hue_play_links',
            'light.wohnzimmer_hue_play_rechts',
            'light.computerbereich',
            'light.sonstiges_festavia_string_lights'
          ] %}
          {{ expand(ids) | selectattr('state', 'eq', 'on') | list | count }}

      - name: Magguu Esszimmer Lichter an
        unique_id: magguu_esszimmer_lichter_an
        state: >-
          {% set ids = ['light.esszimmer_esszimmer', 'light.esszimmer_signe_gradient'] %}
          {{ expand(ids) | selectattr('state', 'eq', 'on') | list | count }}

      - name: Magguu Badezimmer Lichter an
        unique_id: magguu_badezimmer_lichter_an
        state: >-
          {% set ids = [
            'light.badezimmer_badezimmer',
            'light.badezimmer_licht_bad',
            'light.badezimmer_badezimmer_licht_ch8',
            'light.badezimmer_badezimmer_licht_ch12',
            'switch.badezimmer_badezimmer_licht'
          ] %}
          {{ expand(ids) | selectattr('state', 'eq', 'on') | list | count }}

      - name: Magguu Schlafzimmer Lichter an
        unique_id: magguu_schlafzimmer_lichter_an
        state: >-
          {% set ids = [
            'light.schlafzimmer_schlafzimmer',
            'light.schlafzimmer_bett_links',
            'light.schlafzimmer_bett_rechts',
            'switch.schlafzimmer_schlafzimmer_licht'
          ] %}
          {{ expand(ids) | selectattr('state', 'eq', 'on') | list | count }}

      - name: Magguu Kinderzimmer Lichter an
        unique_id: magguu_kinderzimmer_lichter_an
        state: >-
          {% set ids = [
            'light.kinderzimmer_kinderzimmer',
            'light.kinderzimmer_schrank_licht',
            'switch.kinderzimmer_kinderzimmer_licht'
          ] %}
          {{ expand(ids) | selectattr('state', 'eq', 'on') | list | count }}

      - name: Magguu Kueche Lichter an
        unique_id: magguu_kueche_lichter_an
        state: "{{ 1 if is_state('switch.kuche_kuche_licht', 'on') else 0 }}"

  - binary_sensor:
      - name: Magguu Wohnzimmer Oeffnung
        unique_id: magguu_wohnzimmer_oeffnung
        device_class: window
        availability: >-
          {{ states('binary_sensor.wohnzimmer_wohnzimmer_fenster') not in ['unknown', 'unavailable']
             and states('sensor.wohnzimmer_wohnzimmer_fenstertur') not in ['unknown', 'unavailable'] }}
        state: >-
          {{ is_state('binary_sensor.wohnzimmer_wohnzimmer_fenster', 'on')
             or states('sensor.wohnzimmer_wohnzimmer_fenstertur') in ['on', 'open', 'tilted'] }}

      - name: Magguu Kueche Oeffnung
        unique_id: magguu_kueche_oeffnung
        device_class: window
        availability: "{{ states('sensor.kuche_kuche_fenstertur') not in ['unknown', 'unavailable'] }}"
        state: >-
          {{ states('sensor.kuche_kuche_fenstertur') in ['on', 'open', 'tilted'] }}

      - name: Magguu Schlafzimmer Oeffnung
        unique_id: magguu_schlafzimmer_oeffnung
        device_class: window
        availability: "{{ states('binary_sensor.schlafzimmer_schlafzimmer_fenstertur') not in ['unknown', 'unavailable'] }}"
        state: "{{ is_state('binary_sensor.schlafzimmer_schlafzimmer_fenstertur', 'on') }}"

      - name: Magguu Kinderzimmer Oeffnung
        unique_id: magguu_kinderzimmer_oeffnung
        device_class: window
        availability: "{{ states('binary_sensor.kinderzimmer_kinderzimmer_fenster') not in ['unknown', 'unavailable'] }}"
        state: "{{ is_state('binary_sensor.kinderzimmer_kinderzimmer_fenster', 'on') }}"

      - name: Magguu Wohnzimmer Heizwarnung
        unique_id: magguu_wohnzimmer_heizwarnung
        icon: mdi:radiator-off
        device_class: problem
        availability: >-
          {{ states('binary_sensor.magguu_wohnzimmer_oeffnung') not in ['unknown', 'unavailable']
             and states('climate.wohnzimmer_wohnzimmer_thermostat') not in ['unknown', 'unavailable'] }}
        state: >-
          {{ is_state('binary_sensor.magguu_wohnzimmer_oeffnung', 'on')
             and state_attr('climate.wohnzimmer_wohnzimmer_thermostat', 'hvac_action') == 'heating' }}

      - name: Magguu Schlafzimmer Heizwarnung
        unique_id: magguu_schlafzimmer_heizwarnung
        icon: mdi:radiator-off
        device_class: problem
        availability: >-
          {{ states('binary_sensor.magguu_schlafzimmer_oeffnung') not in ['unknown', 'unavailable']
             and states('climate.schlafzimmer_schlafzimmer_thermostat') not in ['unknown', 'unavailable'] }}
        state: >-
          {{ is_state('binary_sensor.magguu_schlafzimmer_oeffnung', 'on')
             and state_attr('climate.schlafzimmer_schlafzimmer_thermostat', 'hvac_action') == 'heating' }}

      - name: Magguu Kinderzimmer Heizwarnung
        unique_id: magguu_kinderzimmer_heizwarnung
        icon: mdi:radiator-off
        device_class: problem
        availability: >-
          {{ states('binary_sensor.magguu_kinderzimmer_oeffnung') not in ['unknown', 'unavailable']
             and states('climate.kinderzimmer_kinderzimmer_thermostat') not in ['unknown', 'unavailable'] }}
        state: >-
          {{ is_state('binary_sensor.magguu_kinderzimmer_oeffnung', 'on')
             and state_attr('climate.kinderzimmer_kinderzimmer_thermostat', 'hvac_action') == 'heating' }}

      - name: Magguu Wetterwarnung
        unique_id: magguu_wetterwarnung
        device_class: problem
        availability: "{{ states('weather.forecast_home') not in ['unknown', 'unavailable'] }}"
        icon: >-
          {% set condition = states('weather.forecast_home') %}
          {% set temperature = state_attr('weather.forecast_home', 'temperature') | float(none) %}
          {% set unit = state_attr('weather.forecast_home', 'temperature_unit') %}
          {% set temperature_c = ((temperature - 32) * 5 / 9) if temperature is not none and unit in ['°F', 'F'] else temperature %}
          {% if condition in ['lightning', 'lightning-rainy', 'exceptional'] %}
            mdi:weather-lightning
          {% elif condition in ['hail', 'snowy', 'snowy-rainy'] or (temperature_c is not none and temperature_c <= 1) %}
            mdi:snowflake-alert
          {% elif condition in ['pouring', 'rainy'] %}
            mdi:weather-pouring
          {% else %}
            mdi:weather-windy
          {% endif %}
        state: >-
          {% set condition = states('weather.forecast_home') %}
          {% set wind = state_attr('weather.forecast_home', 'wind_speed') | float(none) %}
          {% set gust = state_attr('weather.forecast_home', 'wind_gust_speed') | float(none) %}
          {% set wind_unit = state_attr('weather.forecast_home', 'wind_speed_unit') %}
          {% set factor = 3.6 if wind_unit == 'm/s' else 1.609344 if wind_unit in ['mph', 'mi/h'] else 1.852 if wind_unit in ['kn', 'kt'] else 1.09728 if wind_unit == 'ft/s' else 1 %}
          {% set wind_kmh = wind * factor if wind is not none else none %}
          {% set gust_kmh = gust * factor if gust is not none else none %}
          {% set temperature = state_attr('weather.forecast_home', 'temperature') | float(none) %}
          {% set temperature_unit = state_attr('weather.forecast_home', 'temperature_unit') %}
          {% set temperature_c = ((temperature - 32) * 5 / 9) if temperature is not none and temperature_unit in ['°F', 'F'] else temperature %}
          {{ condition in ['exceptional', 'hail', 'lightning', 'lightning-rainy', 'pouring', 'rainy', 'snowy', 'snowy-rainy', 'windy', 'windy-variant']
             or (wind_kmh is not none and wind_kmh >= 50)
             or (gust_kmh is not none and gust_kmh >= 65)
             or (temperature_c is not none and temperature_c <= 1) }}
        attributes:
          summary: >-
            {% set ns = namespace(items=[]) %}
            {% set condition = states('weather.forecast_home') %}
            {% set wind = state_attr('weather.forecast_home', 'wind_speed') | float(none) %}
            {% set gust = state_attr('weather.forecast_home', 'wind_gust_speed') | float(none) %}
            {% set wind_unit = state_attr('weather.forecast_home', 'wind_speed_unit') %}
            {% set factor = 3.6 if wind_unit == 'm/s' else 1.609344 if wind_unit in ['mph', 'mi/h'] else 1.852 if wind_unit in ['kn', 'kt'] else 1.09728 if wind_unit == 'ft/s' else 1 %}
            {% set wind_kmh = wind * factor if wind is not none else none %}
            {% set gust_kmh = gust * factor if gust is not none else none %}
            {% set temperature = state_attr('weather.forecast_home', 'temperature') | float(none) %}
            {% set temperature_unit = state_attr('weather.forecast_home', 'temperature_unit') %}
            {% set temperature_c = ((temperature - 32) * 5 / 9) if temperature is not none and temperature_unit in ['°F', 'F'] else temperature %}
            {% if condition in ['exceptional', 'hail', 'lightning', 'lightning-rainy'] %}
              {% set ns.items = ns.items + ['Unwetter oder Gewitter'] %}
            {% elif condition in ['pouring', 'rainy'] %}
              {% set ns.items = ns.items + ['Regen – offene Fenster prüfen'] %}
            {% elif condition in ['snowy', 'snowy-rainy'] %}
              {% set ns.items = ns.items + ['Schnee oder Glätte möglich'] %}
            {% endif %}
            {% if (wind_kmh is not none and wind_kmh >= 50) or (gust_kmh is not none and gust_kmh >= 65) or condition in ['windy', 'windy-variant'] %}
              {% set ns.items = ns.items + ['Starker Wind – Rollläden beachten'] %}
            {% endif %}
            {% if temperature_c is not none and temperature_c <= 1 %}
              {% set ns.items = ns.items + ['Frostgefahr bei ' ~ (temperature_c | round(1)) ~ ' °C'] %}
            {% endif %}
            {{ ns.items | join(' · ') }}

      - name: Magguu iPhone Akkuwarnung
        unique_id: magguu_iphone_akkuwarnung
        device_class: problem
        icon: mdi:battery-alert-variant-outline
        availability: "{{ is_number(states('sensor.iphone_von_marco_battery_level')) }}"
        state: >-
          {% set level = states('sensor.iphone_von_marco_battery_level') | int(100) %}
          {% set charging = states('sensor.iphone_von_marco_battery_state') | lower %}
          {{ level < 20 and charging not in ['charging', 'full', 'lädt', 'voll'] }}
        attributes:
          summary: >-
            iPhone bei {{ states('sensor.iphone_von_marco_battery_level') }} %
            · {{ states('sensor.iphone_von_marco_battery_state') }}

      - name: Magguu Abwesenheitswarnung
        unique_id: magguu_abwesenheitswarnung
        device_class: problem
        icon: mdi:home-alert-outline
        availability: >-
          {{ states('person.magguu') not in ['unknown', 'unavailable']
             and is_number(states('sensor.magguu_offene_fenster'))
             and is_number(states('sensor.magguu_lichter_an')) }}
        state: >-
          {{ not is_state('person.magguu', 'home')
             and (states('sensor.magguu_offene_fenster') | int(0) > 0
                  or states('sensor.magguu_lichter_an') | int(0) > 0) }}
        attributes:
          summary: >-
            {% set ns = namespace(items=[]) %}
            {% set openings = states('sensor.magguu_offene_fenster') | int(0) %}
            {% set lights = states('sensor.magguu_lichter_an') | int(0) %}
            {% if openings > 0 %}
              {% set ns.items = ns.items + [openings ~ ' Öffnung(en) offen'] %}
            {% endif %}
            {% if lights > 0 %}
              {% set ns.items = ns.items + [lights ~ ' Licht(er) an'] %}
            {% endif %}
            {{ ns.items | join(' · ') }}
