title: Badezimmer
path: badezimmer
icon: mdi:shower
subview: true
theme: Magguu Midnight
type: custom:grid-layout
layout:
  max-width: 1180px
  margin: 0 auto
  padding: var(--mag-space-page-wide, 18px) var(--mag-space-page-wide, 18px) 40px
  grid-gap: 14px
  grid-template-columns: repeat(2, minmax(0, 1fr))
  grid-template-areas: |
    "hero hero"
    "light climate"
  mediaquery:
    "(max-width: 760px)":
      padding: var(--mag-space-page-mobile, 10px) var(--mag-space-page-mobile, 10px) 28px
      grid-template-columns: minmax(0, 1fr)
      grid-template-areas: |
        "hero"
        "light"
        "climate"
cards:
  - type: custom:button-card
    template: room_detail_header_v7
    name: Badezimmer
    icon: mdi:shower
    variables:
      subtitle: Beleuchtung und Wohlfühltemperatur
      accent: '#57cbd3'
      temperature_entity: sensor.magguu_badezimmer_temperatur_c
      humidity_entity: sensor.badezimmer_badezimmer_thermostat_rel_luftfeuchte
      light_count_entity: sensor.magguu_badezimmer_lichter_an
      climate_entity: climate.badezimmer_badezimmer_thermostat
    view_layout: {grid-area: hero}

  - type: vertical-stack
    view_layout: {grid-area: light}
    cards:
      - type: custom:mushroom-title-card
        title: Beleuchtung
        subtitle: Gruppen und Farblicht dimmen
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.badezimmer_badezimmer
        name: Badezimmer gesamt
        icon: mdi:lightbulb-group-outline
        show_state: true
        card_layout: large
        styles: &bubble_style |
          ha-card {
            --bubble-border-radius: var(--mag-radius-card, 24px);
            --bubble-box-shadow: var(--mag-shadow-card, none);
            --bubble-border: 1px solid var(--mag-border, rgba(255,255,255,.06));
          }
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.badezimmer_licht_bad
        name: Hue Licht Bad
        icon: mdi:ceiling-light
        show_state: true
        card_layout: large
        styles: *bubble_style
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.badezimmer_badezimmer_licht_ch8
        name: Farblicht oben
        icon: mdi:led-strip-variant
        show_state: true
        card_layout: large
        styles: *bubble_style
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.badezimmer_badezimmer_licht_ch12
        name: Farblicht unten
        icon: mdi:led-strip-variant
        show_state: true
        card_layout: large
        styles: *bubble_style
      - type: custom:mushroom-entity-card
        entity: switch.badezimmer_badezimmer_licht
        name: Hauptlicht
        icon: mdi:ceiling-light
        tap_action: {action: toggle}
        hold_action: {action: more-info}
        card_mod: &detail_card
          style: |
            ha-card {
              min-height: 86px;
              border-radius: var(--mag-radius-card, 24px);
              background: var(--mag-surface, rgba(24,25,39,.94));
              border: 1px solid var(--mag-border, rgba(255,255,255,.06));
              box-shadow: var(--mag-shadow-card, none);
            }

  - type: vertical-stack
    view_layout: {grid-area: climate}
    cards:
      - type: custom:mushroom-title-card
        title: Klima
        subtitle: Heizung und 48-Stunden-Verlauf
      - type: custom:mushroom-climate-card
        entity: climate.badezimmer_badezimmer_thermostat
        name: Badezimmer
        show_temperature_control: true
        collapsible_controls: false
        card_mod: *detail_card
      - type: custom:mini-graph-card
        name: Temperatur · 48 Stunden
        hours_to_show: 48
        points_per_hour: 1
        line_width: 2
        show: {labels: true, legend: false, fill: fade}
        entities:
          - sensor.magguu_badezimmer_temperatur_c
        card_mod: *detail_card
