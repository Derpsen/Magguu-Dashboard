- type: custom:button-card
  template: page_header_v6
  name: Sicherheit
  icon: mdi:shield-home-outline
  variables:
    subtitle: Anwesenheit, Alarmmeldungen und alle überwachten Öffnungen
    accent: '#79d98c'
  view_layout: {grid-area: hero}

- type: vertical-stack
  view_layout: {grid-area: status}
  cards:
    - type: custom:mushroom-title-card
      title: Hausstatus
      subtitle: Die wichtigsten Sicherheitszustände ohne Umwege

    - type: custom:mushroom-template-card
      entity: sensor.magguu_sicherheitsstatus
      primary: >-
        {{ 'Sofort prüfen' if states(entity) == 'kritisch'
           else 'Öffnungen prüfen' if states(entity) == 'pruefen'
           else 'Alles im grünen Bereich' }}
      secondary: "{{ state_attr(entity, 'summary') }}"
      multiline_secondary: true
      icon: "{{ state_attr(entity, 'icon') or 'mdi:shield-home-outline' }}"
      icon_color: >-
        {{ 'red' if states(entity) == 'kritisch'
           else 'orange' if states(entity) == 'pruefen'
           else 'green' }}
      tap_action: {action: more-info}
      card_mod: &security_card
        style: |
          ha-card {
            min-height: 112px;
            border-radius: var(--mag-radius-card, 24px);
            background:
              radial-gradient(circle at 90% 15%, rgba(121,217,140,.14), transparent 34%),
              var(--mag-surface, rgba(24,25,39,.94));
            border: 1px solid var(--mag-border, rgba(255,255,255,.06));
            box-shadow: var(--mag-shadow-card, none);
          }

    - type: grid
      columns: 3
      square: false
      cards:
        - type: custom:mushroom-template-card
          entity: person.magguu
          primary: Marco
          secondary: "{{ 'Zuhause' if is_state(entity, 'home') else 'Unterwegs' }}"
          icon: "{{ 'mdi:home-account' if is_state(entity, 'home') else 'mdi:account-arrow-right-outline' }}"
          icon_color: "{{ 'green' if is_state(entity, 'home') else 'grey' }}"
          tap_action: {action: more-info}
          card_mod: *security_card
        - type: custom:mushroom-template-card
          entity: sensor.magguu_offene_fenster
          primary: Öffnungen
          secondary: "{{ states(entity) }} geöffnet"
          icon: "{{ 'mdi:window-open-variant' if states(entity) | int(0) > 0 else 'mdi:window-closed-variant' }}"
          icon_color: "{{ 'orange' if states(entity) | int(0) > 0 else 'green' }}"
          tap_action: {action: more-info}
          card_mod: *security_card
        - type: custom:mushroom-template-card
          entity: sensor.openccu_alarmmeldungen
          primary: OpenCCU
          secondary: "{{ states(entity) }} Alarmmeldung(en)"
          icon: mdi:alarm-light-outline
          icon_color: "{{ 'red' if states(entity) | int(0) > 0 else 'green' }}"
          tap_action: {action: more-info}
          card_mod: *security_card

- type: vertical-stack
  view_layout: {grid-area: details}
  cards:
    - !include heating-hints.yaml
    - !include openings.yaml

- type: vertical-stack
  view_layout: {grid-area: connect}
  cards:
    - type: custom:mushroom-title-card
      title: Zutritt & Kamera
      subtitle: Sicher vorbereitet – aktiv erst mit verifizierten Entitäten

    - type: grid
      columns: 2
      square: false
      cards:
        - type: custom:mushroom-template-card
          primary: Nuki vorbereiten
          secondary: Schloss, Türkontakt und Batterie nach Entitäten-Export
          multiline_secondary: true
          icon: mdi:lock-smart
          icon_color: grey
          tap_action:
            action: navigate
            navigation_path: /config/integrations/dashboard
          card_mod: *security_card
        - type: custom:mushroom-template-card
          primary: Ring vorbereiten
          secondary: Klingel, Bewegung und Kamerabild nach Entitäten-Export
          multiline_secondary: true
          icon: mdi:doorbell-video
          icon_color: grey
          tap_action:
            action: navigate
            navigation_path: /config/integrations/dashboard
          card_mod: *security_card

- !include ../navbar.yaml
