title: Esszimmer
path: esszimmer
icon: mdi:table-furniture
subview: true
theme: Magguu Midnight
type: custom:grid-layout
layout:
  max-width: 1180px
  margin: 0 auto
  padding: var(--mag-space-page-wide, 18px) var(--mag-space-page-wide, 18px) 40px
  grid-gap: 14px
  grid-template-columns: repeat(2, minmax(0, 1fr))
  grid-template-areas: |
    "hero hero"
    "light climate"
  mediaquery:
    "(max-width: 760px)":
      padding: var(--mag-space-page-mobile, 10px) var(--mag-space-page-mobile, 10px) 28px
      grid-template-columns: minmax(0, 1fr)
      grid-template-areas: |
        "hero"
        "light"
        "climate"
cards:
  - type: custom:button-card
    template: room_detail_header_v7
    name: Esszimmer
    icon: mdi:table-furniture
    variables:
      subtitle: Licht und Raumklima entspannt steuern
      accent: '#f3a84b'
      temperature_entity: sensor.magguu_esszimmer_temperatur_c
      humidity_entity: sensor.esszimmer_thermostat_rel_luftfeuchte
      light_count_entity: sensor.magguu_esszimmer_lichter_an
      climate_entity: climate.esszimmer_thermostat
    view_layout: {grid-area: hero}

  - type: vertical-stack
    view_layout: {grid-area: light}
    cards:
      - type: custom:mushroom-title-card
        title: Beleuchtung
        subtitle: Helligkeit direkt anpassen
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.esszimmer_esszimmer
        name: Esszimmer gesamt
        icon: mdi:lightbulb-group-outline
        show_state: true
        card_layout: large
        styles: &bubble_style |
          ha-card {
            --bubble-border-radius: var(--mag-radius-card, 24px);
            --bubble-box-shadow: var(--mag-shadow-card, none);
            --bubble-border: 1px solid var(--mag-border, rgba(255,255,255,.06));
          }
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.esszimmer_signe_gradient
        name: Signe Gradient
        icon: mdi:floor-lamp
        show_state: true
        card_layout: large
        styles: *bubble_style

  - type: vertical-stack
    view_layout: {grid-area: climate}
    cards:
      - type: custom:mushroom-title-card
        title: Klima
        subtitle: Heizung und 48-Stunden-Verlauf
      - type: custom:mushroom-climate-card
        entity: climate.esszimmer_thermostat
        name: Esszimmer
        show_temperature_control: true
        collapsible_controls: false
        card_mod: &detail_card
          style: |
            ha-card {
              border-radius: var(--mag-radius-card, 24px);
              background: var(--mag-surface, rgba(24,25,39,.94));
              border: 1px solid var(--mag-border, rgba(255,255,255,.06));
              box-shadow: var(--mag-shadow-card, none);
            }
      - type: custom:mini-graph-card
        name: Temperatur · 48 Stunden
        hours_to_show: 48
        points_per_hour: 1
        line_width: 2
        show: {labels: true, legend: false, fill: fade}
        entities:
          - sensor.magguu_esszimmer_temperatur_c
        card_mod: *detail_card
