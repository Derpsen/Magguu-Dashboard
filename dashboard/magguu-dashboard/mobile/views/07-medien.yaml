- title: Medien
  path: medien
  icon: mdi:play-box-multiple-outline
  theme: Magguu Midnight
  type: custom:grid-layout
  layout:
    max-width: 760px
    margin: 0 auto
    padding: var(--mag-space-page-mobile, 10px) var(--mag-space-page-mobile, 10px) 96px
    grid-gap: 14px
    grid-template-columns: minmax(0, 1fr)
    grid-template-areas: |
      "hero"
      "player"
      "scenes"
  cards: !include ../../shared/cards/media.yaml
