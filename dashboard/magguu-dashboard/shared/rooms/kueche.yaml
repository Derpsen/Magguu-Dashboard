title: Küche
path: kueche
icon: mdi:countertop-outline
subview: true
theme: Magguu Midnight
type: custom:grid-layout
layout:
  max-width: 1180px
  margin: 0 auto
  padding: var(--mag-space-page-wide, 18px) var(--mag-space-page-wide, 18px) 40px
  grid-gap: 14px
  grid-template-columns: repeat(2, minmax(0, 1fr))
  grid-template-areas: |
    "hero hero"
    "light cover"
  mediaquery:
    "(max-width: 760px)":
      padding: var(--mag-space-page-mobile, 10px) var(--mag-space-page-mobile, 10px) 28px
      grid-template-columns: minmax(0, 1fr)
      grid-template-areas: |
        "hero"
        "light"
        "cover"
cards:
  - type: custom:button-card
    template: room_detail_header_v7
    name: Küche
    icon: mdi:countertop-outline
    variables:
      subtitle: Licht, Rollladen und Öffnungsstatus
      accent: '#79d98c'
      opening_entity: binary_sensor.magguu_kueche_oeffnung
      light_count_entity: sensor.magguu_kueche_lichter_an
    view_layout: {grid-area: hero}

  - type: vertical-stack
    view_layout: {grid-area: light}
    cards:
      - type: custom:mushroom-title-card
        title: Beleuchtung
        subtitle: Küchenlicht direkt schalten
      - type: custom:mushroom-entity-card
        entity: switch.kuche_kuche_licht
        name: Küchenlicht
        icon: mdi:ceiling-light
        tap_action: {action: toggle}
        hold_action: {action: more-info}
        card_mod: &detail_card
          style: |
            ha-card {
              min-height: 86px;
              border-radius: var(--mag-radius-card, 24px);
              background: var(--mag-surface, rgba(24,25,39,.94));
              border: 1px solid var(--mag-border, rgba(255,255,255,.06));
              box-shadow: var(--mag-shadow-card, none);
            }

  - type: vertical-stack
    view_layout: {grid-area: cover}
    cards:
      - type: custom:mushroom-title-card
        title: Rollladen
        subtitle: Position gezielt einstellen
      - type: custom:mushroom-cover-card
        entity: cover.kuche_kuche_rollade
        name: Rollladen Küche
        show_buttons_control: true
        show_position_control: true
        card_mod: *detail_card
