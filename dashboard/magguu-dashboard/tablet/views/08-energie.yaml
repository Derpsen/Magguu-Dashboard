- title: Energie
  path: energie
  icon: mdi:home-lightning-bolt-outline
  theme: Magguu Midnight
  type: custom:grid-layout
  layout:
    max-width: var(--mag-content-max-width, 1460px)
    margin: 0 auto
    padding: var(--mag-space-page-wide, 18px) var(--mag-space-page-wide, 18px) 40px
    grid-gap: 14px
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr)
    grid-template-areas: |
      "hero hero"
      "main setup"
    mediaquery:
      "(max-width: 860px)":
        grid-template-columns: minmax(0, 1fr)
        grid-template-areas: |
          "hero"
          "main"
          "setup"
  cards: !include ../../shared/cards/energy.yaml
